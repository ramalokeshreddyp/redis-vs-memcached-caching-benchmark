version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: catalog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d catalog -c 'SELECT COUNT(*) FROM products;' | grep -q '100000'"]
      interval: 5s
      timeout: 5s
      retries: 60

  redis:
    image: redis:7-alpine
    container_name: catalog_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    container_name: catalog_memcached
    ports:
      - "11211:11211"
    command: ["-m", "256"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'stats' | nc localhost 11211 | grep -q 'STAT pid'"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: catalog_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/catalog
      REDIS_URL: redis://redis:6379
      MEMCACHED_URL: memcached:11211
      API_PORT: 3000
      DEFAULT_CACHE_BACKEND: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      memcached:
        condition: service_healthy
